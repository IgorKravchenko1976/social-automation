# GitLab CI/CD — auto-deploy social-automation bot to the I'M IN VPS
# (the same VPS that hosts imin-backend).
#
# Trigger: any push to `bot` branch.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   SSH_PRIVATE_KEY  — File-type variable, the deploy private key (PEM)
#   VPS_HOST         — 135.125.254.131
#   VPS_USER         — root
#
# What the job does:
#   1. rsync the source tree to /opt/imin-bot on the VPS
#   2. docker compose -f /opt/imin/docker-compose.yml build imin-bot
#   3. docker compose up -d imin-bot
#
# Postgres / nginx / settings-api are untouched (separate compose services).

stages:
  - deploy

deploy_bot:
  stage: deploy
  image: alpine:3.19
  rules:
    - if: '$CI_COMMIT_BRANCH == "bot"'
  before_script:
    - apk add --no-cache openssh-client rsync bash
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      echo "=== [1/3] Rsync source to /opt/imin-bot ==="
      rsync -avz --delete \
        --exclude '.git' \
        --exclude '__pycache__' \
        --exclude '.env' \
        --exclude '.env.example' \
        --exclude 'data/' \
        --exclude 'media_cache/' \
        --exclude '*.pyc' \
        -e "ssh -o StrictHostKeyChecking=no" \
        ./ "${VPS_USER}@${VPS_HOST}:/opt/imin-bot/"
    - |
      echo "=== [2/3] Rebuild image ==="
      ssh -o StrictHostKeyChecking=no "${VPS_USER}@${VPS_HOST}" '
        cd /opt/imin && docker compose build imin-bot
        docker builder prune -af --filter "until=24h" >/dev/null 2>&1 || true
      '
    - |
      echo "=== [3/3] Restart service ==="
      ssh -o StrictHostKeyChecking=no "${VPS_USER}@${VPS_HOST}" '
        cd /opt/imin
        docker compose up -d imin-bot
        sleep 6
        docker ps --filter name=imin-bot --format "table {{.Names}}\t{{.Status}}"
      '
  environment:
    name: production
    url: https://api-v2.im-in.net
